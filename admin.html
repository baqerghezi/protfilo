<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8F0E3; color: #4A3B31; }
        .input-style {
            width: 100%; padding: 0.75rem; border: 1px solid #D1C0AF; border-radius: 0.5rem;
            background-color: #FFFFFF; font-family: inherit; margin-bottom: 1rem;
        }
        .btn-style {
            background-color: #C08261; color: white; padding: 0.75rem 1.5rem;
            border-radius: 0.5rem; font-weight: bold; cursor: pointer; border: none;
            transition: background-color 0.2s;
        }
        .btn-style:hover { background-color: #A46A4E; }
        .btn-delete { background-color: #e53e3e; }
        .btn-delete:hover { background-color: #c53030; }
        .tab-btn { padding: 0.75rem 1rem; cursor: pointer; border-bottom: 2px solid transparent; font-weight: bold; color: #6F5E53; }
        .tab-btn.active { border-bottom-color: #C08261; color: #C08261; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-8">

    <!-- Login Section -->
    <div id="login-section" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg mt-20">
        <h2 class="text-2xl font-bold mb-4">Admin Login</h2>
        <input type="password" id="admin-pwd" class="input-style" placeholder="Enter Password">
        <button onclick="login()" class="btn-style w-full">Login</button>
        <p id="login-error" class="text-red-500 mt-2 hidden">Invalid password</p>
    </div>

    <!-- Admin Dashboard Section -->
    <div id="admin-section" class="max-w-5xl mx-auto bg-white p-8 rounded-xl shadow-lg hidden">
        <div class="flex justify-between items-center mb-6 border-b pb-4 border-[#D1C0AF]">
            <h2 class="text-3xl font-bold">CMS Dashboard</h2>
            <button onclick="logout()" class="text-sm underline text-[#C08261]">Logout</button>
        </div>
        
        <!-- Tabs -->
        <div class="flex space-x-4 mb-6 border-b border-[#D1C0AF] overflow-x-auto">
            <div class="tab-btn active" onclick="switchTab('posts')">Blog Posts</div>
            <div class="tab-btn" onclick="switchTab('cv')">Manage CV</div>
            <div class="tab-btn" onclick="switchTab('projects')">Manage Projects</div>
            <div class="tab-btn" onclick="switchTab('about')">Manage About Me</div>
        </div>

        <!-- 1. Posts Tab -->
        <div id="tab-posts" class="tab-content active">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">All Posts</h3>
                <button onclick="openPostForm()" class="btn-style">Create New Post</button>
            </div>
            <div id="posts-list" class="space-y-4 mb-8"></div>
            
            <!-- Post Editor Form (Hidden by default) -->
            <div id="post-form-container" class="hidden bg-[#F8F0E3] p-6 rounded-lg border border-[#D1C0AF]">
                <h3 id="post-form-title" class="text-xl font-bold mb-4">Create / Edit Post</h3>
                <input type="hidden" id="edit-post-id">
                
                <label class="block font-bold mb-1">Title</label>
                <input type="text" id="post-title" class="input-style" placeholder="Post Title">
                
                <label class="block font-bold mb-1">Date</label>
                <input type="date" id="post-date" class="input-style">
                
                <label class="block font-bold mb-1">Snippet</label>
                <textarea id="post-snippet" class="input-style h-20" placeholder="A short description..."></textarea>
                
                <label class="block font-bold mb-1">Content (Markdown + LaTeX)</label>
                <textarea id="post-content" class="input-style h-64 font-mono text-sm" placeholder="Write markdown here..."></textarea>
                
                <div class="flex space-x-2">
                    <button onclick="savePost()" class="btn-style flex-1">Save Post</button>
                    <button onclick="closePostForm()" class="bg-gray-400 text-white px-4 rounded-lg font-bold hover:bg-gray-500">Cancel</button>
                </div>
                <p id="post-msg" class="mt-2 font-bold"></p>
            </div>
        </div>

        <!-- 2. CV Tab -->
        <div id="tab-cv" class="tab-content">
            <h3 class="text-xl font-bold mb-4">Edit CV Content (Markdown/HTML)</h3>
            <textarea id="cv-content" class="input-style h-96 font-mono text-sm" placeholder="Write your CV here..."></textarea>
            <button onclick="savePage('cv')" class="btn-style w-full">Save CV</button>
            <p id="msg-cv" class="mt-2 font-bold text-center"></p>
        </div>

        <!-- 3. Projects Tab -->
        <div id="tab-projects" class="tab-content">
            <h3 class="text-xl font-bold mb-4">Edit Projects Portfolio (Markdown/HTML)</h3>
            <textarea id="projects-content" class="input-style h-96 font-mono text-sm" placeholder="Write your projects here..."></textarea>
            <button onclick="savePage('projects')" class="btn-style w-full">Save Projects</button>
            <p id="msg-projects" class="mt-2 font-bold text-center"></p>
        </div>

        <!-- 4. About Me Tab -->
        <div id="tab-about" class="tab-content">
            <h3 class="text-xl font-bold mb-4">Edit About Me Section (Markdown/HTML)</h3>
            <textarea id="about-content" class="input-style h-64 font-mono text-sm" placeholder="Write your bio here..."></textarea>
            <button onclick="savePage('about')" class="btn-style w-full">Save About Me</button>
            <p id="msg-about" class="mt-2 font-bold text-center"></p>
        </div>

    </div>

    <script>
        document.getElementById('post-date').valueAsDate = new Date();

        function checkAuth() {
            if (localStorage.getItem('adminPwd')) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
                loadPosts(); // Load posts when logged in
            }
        }
        checkAuth();

        async function login() {
            const pwd = document.getElementById('admin-pwd').value;
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'X-Admin-Password': pwd }
            });
            if (res.ok) {
                localStorage.setItem('adminPwd', pwd);
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
                document.getElementById('login-error').classList.add('hidden');
                loadPosts();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('adminPwd');
            document.getElementById('admin-section').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('admin-pwd').value = '';
        }

        // --- Tab Logic ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');

            if(tabId === 'cv' || tabId === 'projects' || tabId === 'about') {
                loadPage(tabId);
            }
        }

        // --- Posts Logic ---
        async function loadPosts() {
            try {
                const res = await fetch('/api/posts');
                if (!res.ok) throw new Error("Failed to load posts");
                const posts = await res.json();
                const list = document.getElementById('posts-list');
                list.innerHTML = posts.map(p => `
                    <div class="flex justify-between items-center p-4 bg-[#F8F0E3] rounded-lg border border-[#D1C0AF]">
                        <div>
                            <p class="font-bold text-lg">${p.title}</p>
                            <p class="text-sm text-gray-600">${p.date}</p>
                        </div>
                        <div class="space-x-2">
                            <button onclick="editPost(${p.id})" class="btn-style text-sm px-3 py-1">Edit</button>
                            <button onclick="deletePost(${p.id})" class="btn-style btn-delete text-sm px-3 py-1">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        function openPostForm() {
            document.getElementById('edit-post-id').value = '';
            document.getElementById('post-title').value = '';
            document.getElementById('post-date').valueAsDate = new Date();
            document.getElementById('post-snippet').value = '';
            document.getElementById('post-content').value = '';
            document.getElementById('post-form-title').innerText = 'Create New Post';
            document.getElementById('post-form-container').classList.remove('hidden');
            document.getElementById('post-msg').innerText = '';
        }

        function closePostForm() {
            document.getElementById('post-form-container').classList.add('hidden');
        }

        async function editPost(id) {
            try {
                const res = await fetch('/api/posts/' + id);
                if (!res.ok) throw new Error("Failed to fetch post");
                const post = await res.json();
                
                document.getElementById('edit-post-id').value = post.id;
                document.getElementById('post-title').value = post.title;
                document.getElementById('post-date').value = post.date;
                document.getElementById('post-snippet').value = post.snippet;
                document.getElementById('post-content').value = post.content;
                document.getElementById('post-form-title').innerText = `Editing Post: ${post.title}`;
                document.getElementById('post-form-container').classList.remove('hidden');
                window.scrollTo({ top: document.getElementById('post-form-container').offsetTop, behavior: 'smooth' });
            } catch(e) {
                alert("Error fully loading post content");
            }
        }

        async function deletePost(id) {
            if(!confirm("Are you sure you want to delete this post?")) return;
            const pwd = localStorage.getItem('adminPwd');
            const res = await fetch('/api/posts/' + id, {
                method: 'DELETE',
                headers: { 'X-Admin-Password': pwd }
            });
            if (res.ok) {
                loadPosts();
            } else {
                alert("Failed to delete post");
            }
        }

        async function savePost() {
            const pwd = localStorage.getItem('adminPwd');
            const id = document.getElementById('edit-post-id').value;
            const data = {
                title: document.getElementById('post-title').value,
                date: document.getElementById('post-date').value,
                snippet: document.getElementById('post-snippet').value,
                content: document.getElementById('post-content').value
            };

            const msgEl = document.getElementById('post-msg');
            msgEl.textContent = 'Saving...';
            msgEl.className = 'mt-2 font-bold text-gray-500';

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/posts/${id}` : '/api/posts';

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'X-Admin-Password': pwd },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                msgEl.textContent = 'Success! Post saved.';
                msgEl.className = 'mt-2 font-bold text-green-600';
                setTimeout(() => { closePostForm(); loadPosts(); }, 1000);
            } else {
                msgEl.textContent = 'Error saving post. Check password.';
                msgEl.className = 'mt-2 font-bold text-red-600';
                if (res.status === 401) logout();
            }
        }

        // --- Pages Logic ---
        async function loadPage(slug) {
            try {
                const res = await fetch('/api/pages/' + slug);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById(slug + '-content').value = data.content || '';
                }
            } catch(e) {
                console.error("Error loading specific page content", e);
            }
        }

        async function savePage(slug) {
            const pwd = localStorage.getItem('adminPwd');
            const content = document.getElementById(slug + '-content').value;
            const msgEl = document.getElementById('msg-' + slug);
            
            msgEl.textContent = 'Saving...';
            msgEl.className = 'mt-2 font-bold text-gray-500';

            const res = await fetch('/api/pages/' + slug, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Admin-Password': pwd },
                body: JSON.stringify({ content })
            });

            if (res.ok) {
                msgEl.textContent = 'Saved successfully!';
                msgEl.className = 'mt-2 font-bold text-green-600';
                setTimeout(() => { msgEl.textContent = ''; }, 3000);
            } else {
                msgEl.textContent = 'Error saving page.';
                msgEl.className = 'mt-2 font-bold text-red-600';
            }
        }
    </script>
</body>
</html>
