<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammad Al Baqer Alghezi - CV</title>
    <meta name="description" content="Curriculum Vitae of Mohammad Al Baqer Alghezi, an Optical Engineering PhD student based in Dayton, Ohio.">
    <meta name="keywords" content="Mohammad Al Baqer Alghezi, CV, resume, curriculum vitae, optical engineering, photonics, PhD student, electro-optics, University of Dayton">
    <link rel="canonical" href="https://baqerghezi.github.io/mohammadcv.html"> <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>

    <style>
        /* Define color palette using CSS Custom Properties (Variables) */
        :root {
            --bg-primary: #F8F0E3; /* old-paper equivalent */
            --bg-secondary: #FFFFFF; /* For elements like cards or slightly off-main background areas */
            --text-primary: #4A3B31; /* dark-ink equivalent */
            --text-secondary: #6F5E53; /* Slightly lighter than primary text */
            --border-primary: #D1C0AF; /* Softer brown for borders */
            --accent-primary: #C08261;
            --accent-primary-hover: #A46A4E;
            --shadow-color: rgba(74, 59, 49, 0.1); /* Shadow based on dark-ink */
            --nav-bg: rgba(248, 240, 227, 0.85); /* Slightly transparent old-paper for nav */
        }

        .dark:root {
            --bg-primary: #221E1F; /* Dark background */
            --bg-secondary: #2d2829; /* Slightly lighter dark background for cards */
            --text-primary: #E0D6C7; /* Light ink for dark mode */
            --text-secondary: #B0A69A; /* Slightly darker light ink */
            --border-primary: #5A524C; /* Darker border for dark mode */
            --accent-primary: #D4A187; /* Lighter accent for dark mode */
            --accent-primary-hover: #B88A71;
            --shadow-color: rgba(224, 214, 199, 0.08); /* Light shadow for dark mode */
            --nav-bg: rgba(34, 30, 31, 0.85); /* Slightly transparent dark-bg for nav */
        }

        /* Apply base styles using variables */
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
        }

        .content-card { /* Re-using this style for CV sections */
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            box-shadow: 0 4px 6px -1px var(--shadow-color), 0 2px 4px -2px var(--shadow-color);
            transition: background-color 0.3s ease-in-out, border-color 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            padding: 1.5rem; /* p-6 */
            border-radius: 0.75rem; /* rounded-xl */
            margin-bottom: 1.5rem; /* mb-6 */
        }
        .content-card:hover {
             box-shadow: 0 10px 15px -3px var(--shadow-color), 0 4px 6px -4px var(--shadow-color);
        }

        .top-nav-container {
            background-color: var(--nav-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-primary);
        }
        
        /* Styles for CV sections */
        .cv-section-title {
            font-size: 1.5rem; /* text-2xl */
            font-weight: 700; /* font-bold */
            color: var(--text-primary);
            border-bottom: 2px solid var(--border-primary);
            padding-bottom: 0.75rem; /* pb-3 */
            margin-bottom: 1.5rem; /* mb-6 */
        }
        .cv-item-title {
            font-size: 1.125rem; /* text-xl */
            font-weight: 700; /* font-bold */
            color: var(--text-primary);
            margin-bottom: 0.25rem; /* mb-1 */
        }
        .cv-item-subtitle, .cv-item-date {
            font-size: 0.875rem; /* text-sm */
            color: var(--text-secondary);
            margin-bottom: 0.5rem; /* mb-2 */
        }
        .cv-item-details {
            font-size: 1rem; /* text-base */
            color: var(--text-secondary);
            padding-left: 1.5rem; /* pl-6 for bullet points */
        }
        .cv-item-details li {
            margin-bottom: 0.25rem; /* mb-1 */
        }
        .cv-skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem; /* gap-2 */
        }
        .cv-skill-tag {
            background-color: var(--accent-primary);
            color: var(--bg-secondary); /* Ensuring contrast */
            padding: 0.25rem 0.75rem; /* py-1 px-3 */
            border-radius: 0.375rem; /* rounded-md */
            font-size: 0.875rem; /* text-sm */
            font-weight: 500; /* font-medium */
        }
        .dark .cv-skill-tag { /* Ensure skill tag text is readable in dark mode */
            color: var(--bg-primary);
        }
        .location-icon {
            display: inline-block;
            width: 0.875em; /* text-sm size equivalent */
            height: 0.875em; /* text-sm size equivalent */
            margin-right: 0.25rem; /* mr-1 */
            vertical-align: -0.125em; /* Adjust vertical alignment */
            fill: currentColor;
        }

    </style>
</head>
<body class="font-inter leading-relaxed">

    <div id="navigation-container" class="sticky top-0 z-50 top-nav-container">
        </div>

    <div class="container mx-auto max-w-6xl px-4 sm:px-6 lg:px-8 pt-8 md:pt-12 pb-16">
        <main class="w-full">
            <div id="cv-content-container" class="prose max-w-none bg-[var(--bg-secondary)] border border-[var(--border-primary)] shadow-lg p-6 rounded-xl text-[var(--text-primary)]">
                Loading CV...
            </div>

            <footer class="text-center mt-16 pt-8 border-t border-[var(--border-primary)]">
                <p class="text-sm text-[var(--text-secondary)]">&copy; 2025 Mohammad Al Baqer Alghezi. All rights reserved.</p>
            </footer>
        </main>
    </div>

    <script>
        // --- Function to Render Navigation ---
        function renderNavigation(currentPage) {
            const navContainer = document.getElementById('navigation-container');
            if (!navContainer) return;

            const activeClasses = "ring-2 ring-[var(--accent-primary)]"; 
            const inactiveClasses = "hover:text-[var(--accent-primary)] hover:bg-[var(--border-primary)]/20";

            // Note: Update URLs to be absolute paths from the root of your GitHub pages site if needed.
            // Example: "/index.html" instead of "https://baqerghezi.github.io/index.html" if all files are in the root.
            // For now, using the provided absolute URLs.
            const navHTML = `
                <div class="container mx-auto max-w-6xl px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
                    <a href="/index.html" class="text-2xl font-bold text-[var(--text-primary)] hover:text-[var(--accent-primary)] transition-colors">
                        M. A. Alghezi
                    </a>
                    <div class="flex items-center space-x-2 sm:space-x-4">
                        <a href="/index.html" class="px-3 py-2 rounded-md text-sm font-medium text-[var(--text-primary)] transition-colors ${currentPage === 'home' ? activeClasses : inactiveClasses}">Home</a>
                        <a href="/blog.html" class="px-3 py-2 rounded-md text-sm font-medium text-[var(--text-primary)] transition-colors ${currentPage === 'blog' ? activeClasses : inactiveClasses}">Blog</a>
                        <a href="/mbgcv.html" class="px-3 py-2 rounded-md text-sm font-medium text-[var(--text-primary)] transition-colors ${currentPage === 'cv' ? activeClasses : inactiveClasses}">CV</a>
                        <button id="theme-toggle" type="button" class="p-2 rounded-lg text-[var(--text-primary)] hover:bg-[var(--border-primary)]/30 focus:outline-none focus:ring-2 focus:ring-[var(--accent-primary)] transition-colors">
                            <svg id="theme-toggle-dark-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 hidden"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21c3.978 0 7.44-2.03 9.002-5.002Z" /></svg>
                            <svg id="theme-toggle-light-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 hidden"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-6.364-.386 1.591-1.591M3 12h2.25m.386-6.364 1.591 1.591" /></svg>
                            <span class="sr-only">Toggle theme</span>
                        </button>
                    </div>
                </div>
            `;
            navContainer.innerHTML = navHTML;

            const themeToggleBtn = document.getElementById('theme-toggle');
            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    const isCurrentlyDark = document.documentElement.classList.contains('dark');
                    applyTheme(!isCurrentlyDark);
                });
            }
        }

        // --- Theme Toggle Functionality ---
        function applyTheme(isDark) {
            const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
            const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

            if (isDark) {
                document.documentElement.classList.add('dark');
                if (themeToggleDarkIcon) themeToggleDarkIcon.classList.remove('hidden');
                if (themeToggleLightIcon) themeToggleLightIcon.classList.add('hidden');
                localStorage.setItem('color-theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                if (themeToggleDarkIcon) themeToggleDarkIcon.classList.add('hidden');
                if (themeToggleLightIcon) themeToggleLightIcon.classList.remove('hidden');
                localStorage.setItem('color-theme', 'light');
            }
        }

        // --- Initial Load ---
        document.addEventListener('DOMContentLoaded', () => {
            renderNavigation('cv'); // Set 'cv' as the current page

            const preferredTheme = localStorage.getItem('color-theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (preferredTheme === 'dark' || (!preferredTheme && systemPrefersDark)) {
                applyTheme(true);
            } else {
                applyTheme(false);
            }

            // Fetch dynamic content
            async function fetchPageContent(slug, containerId) {
                try {
                    const res = await fetch('/api/pages/' + slug);
                    if (res.ok) {
                        const data = await res.json();
                        if (typeof marked !== 'undefined' && data.content) {
                            document.getElementById(containerId).innerHTML = marked.parse(data.content);
                        } else if (!data.content) {
                            document.getElementById(containerId).innerHTML = "<p>No CV content has been added yet.</p>";
                        }
                    }
                } catch(e) {
                    console.error("Error fetching content for " + slug, e);
                }
            }

            fetchPageContent('cv', 'cv-content-container');
        });
    </script>

</body>
</html>
