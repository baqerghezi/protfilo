<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Blog Post | Mohammad Al Baqer Alghezi</title>
    <meta name="description" content="Blog post by Mohammad Al Baqer Alghezi">
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        svg: {
          fontCache: 'global'
        }
      };
    </script>
    <script id="MathJax-script" async
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* Define color palette using CSS Custom Properties (Variables) */
        :root {
            --bg-primary: #F8F0E3;
            --bg-secondary: #FFFFFF;
            --text-primary: #4A3B31;
            --text-secondary: #6F5E53;
            --border-primary: #D1C0AF;
            --accent-primary: #C08261;
            --accent-primary-hover: #A46A4E;
            --shadow-color: rgba(74, 59, 49, 0.1);
            --nav-bg: rgba(248, 240, 227, 0.85);
            /* Prose specific variables for light mode */
            --prose-body: var(--text-primary);
            --prose-headings: var(--text-primary);
            --prose-lead: var(--text-secondary);
            --prose-links: var(--accent-primary);
            --prose-bold: var(--text-primary);
            --prose-counters: var(--text-secondary);
            --prose-bullets: var(--border-primary);
            --prose-hr: var(--border-primary);
            --prose-quotes: var(--text-primary);
            --prose-quote-borders: var(--border-primary);
            --prose-captions: var(--text-secondary);
            --prose-code: var(--accent-primary);
            --prose-pre-code: var(--text-primary);
            --prose-pre-bg: var(--border-primary);
            --prose-th-borders: var(--border-primary);
            --prose-td-borders: var(--border-primary);
        }

        .dark:root {
            --bg-primary: #221E1F;
            --bg-secondary: #2d2829;
            --text-primary: #E0D6C7;
            --text-secondary: #B0A69A;
            --border-primary: #5A524C;
            --accent-primary: #D4A187;
            --accent-primary-hover: #B88A71;
            --shadow-color: rgba(224, 214, 199, 0.08);
            --nav-bg: rgba(34, 30, 31, 0.85);
            /* Prose specific variables for dark mode */
            --prose-body: var(--text-primary);
            --prose-headings: var(--text-primary);
            --prose-lead: var(--text-secondary);
            --prose-links: var(--accent-primary);
            --prose-bold: var(--text-primary);
            --prose-counters: var(--text-secondary);
            --prose-bullets: var(--border-primary);
            --prose-hr: var(--border-primary);
            --prose-quotes: var(--text-primary);
            --prose-quote-borders: var(--border-primary);
            --prose-captions: var(--text-secondary);
            --prose-code: var(--accent-primary);
            --prose-pre-code: #F8F0E3;
            --prose-pre-bg: #3a3330;
            --prose-th-borders: var(--border-primary);
            --prose-td-borders: var(--border-primary);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
        }

        .top-nav-container {
            background-color: var(--nav-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-primary);
        }

        /* Ensure images, GIFs, and YouTube embeds are flexible */
        .prose img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 0.5rem; 
        }
        .prose iframe { 
            max-width: 100%; 
            border-radius: 0.5rem; 
            box-shadow: 0 4px 6px -1px var(--shadow-color);
        }
        .prose figcaption {
            color: var(--prose-captions);
            font-size: 0.875rem;
            text-align: center;
            margin-top: 0.5rem;
        }

        .post-meta {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        .prose { color: var(--prose-body); }
        .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 { color: var(--prose-headings); }
        .prose a { color: var(--prose-links); text-decoration: none; }
        .prose a:hover { text-decoration: underline; }
        .prose strong { color: var(--prose-bold); }
        .prose blockquote { color: var(--prose-quotes); border-left-color: var(--prose-quote-borders); }
        .prose code { color: var(--prose-code); background-color: var(--prose-pre-bg); padding: 0.2em 0.4em; margin: 0; font-size: 85%; border-radius: 3px; }
        .prose pre { background-color: var(--prose-pre-bg); color: var(--prose-pre-code); border-radius: 0.375rem; padding: 1rem; overflow-x: auto; }
        .prose pre code { background-color: transparent; padding: 0; margin: 0; font-size: inherit; border-radius: 0; color: inherit; }
        .prose hr { border-color: var(--prose-hr); }
        .prose ul > li::before { background-color: var(--prose-bullets); }
        .prose ol > li::before { color: var(--prose-counters); }

        .prose mjx-container[display="true"] { margin-top: 1.5em; margin-bottom: 1.5em; }

    </style>
</head>
<body class="font-inter leading-relaxed">

    <div id="navigation-container" class="sticky top-0 z-50 top-nav-container"></div>

    <div class="container mx-auto max-w-6xl px-4 pt-10 md:pt-16 pb-20">
        <div id="loading" class="text-center font-bold text-xl mb-6">Loading post...</div>
        <div id="post-content-wrapper" class="hidden flex justify-center px-4 md:px-0"> 
            <main class="w-full max-w-4xl bg-[var(--bg-secondary)] shadow-lg rounded-xl p-8 sm:p-12 md:p-20 lg:p-28 border border-[var(--border-primary)] transition-colors duration-300 antialiased mx-auto"> 
                <header class="mb-10 lg:mb-12 text-center">
                    <h1 id="post-title" class="text-4xl md:text-5xl font-extrabold text-[var(--text-primary)] mb-6 leading-tight tracking-tight max-w-4xl mx-auto"></h1>
                    
                    <div id="post-metadata-container" class="space-y-4">
                        <!-- Populated by JS -->
                    </div>
                </header>

                <div class="h-px bg-gradient-to-r from-transparent via-[var(--border-primary)] to-transparent w-full mb-10 opacity-70"></div>
                
                <div class="text-center w-full mb-6">
                    <h2 id="abstract-heading" class="text-3xl font-bold hidden text-[var(--text-primary)]">Abstract</h2>
                </div>

                <article class="prose lg:prose-lg xl:prose-xl !max-w-none prose-p:text-justify" id="post-container"> 
                </article>

                <div class="mt-16 pt-10 border-t border-[var(--border-primary)] flex justify-center">
                    <a href="/blog.html" class="inline-flex items-center space-x-2 text-[var(--accent-primary)] hover:text-[var(--accent-primary-hover)] font-bold hover:underline transition-all duration-200 px-6 py-3 rounded-full bg-[var(--bg-primary)] hover:bg-[var(--border-primary)]/40 shadow-sm border border-[var(--border-primary)]">
                        <span class="text-xl leading-none">&larr;</span>
                        <span>Back to Articles</span>
                    </a>
                </div>

                <footer class="text-center mt-16 pt-8 border-t border-[var(--border-primary)]">
                    <p class="text-sm text-[var(--text-secondary)]">© 2025 Mohammad Al Baqer Alghezi. All rights reserved.</p>
                </footer>
            </main>
        </div>
    </div>

    <script>
        function renderNavigation(currentPage) {
            const navContainer = document.getElementById('navigation-container');
            if (!navContainer) return;
            const activeClasses = "ring-2 ring-[var(--accent-primary)]";
            const inactiveClasses = "hover:text-[var(--accent-primary)] hover:bg-[var(--border-primary)]/20";
            const navHTML = `
                <div class="container mx-auto max-w-6xl px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
                    <a href="/index.html" class="text-2xl font-bold text-[var(--text-primary)] hover:text-[var(--accent-primary)] transition-colors">
                        M. A. Alghezi
                    </a>
                    <div class="flex items-center space-x-2 sm:space-x-4">
                        <a href="/index.html" class="px-3 py-2 rounded-md text-sm font-medium text-[var(--text-primary)] transition-colors ${currentPage === 'home' ? activeClasses : inactiveClasses}">Home</a>
                        <a href="/blog.html" class="px-3 py-2 rounded-md text-sm font-medium text-[var(--text-primary)] transition-colors ${currentPage === 'blog' ? activeClasses : inactiveClasses}">Blog</a>
                        <a href="/mbgcv.html" target="_blank" rel="noopener noreferrer" class="px-3 py-2 rounded-md text-sm font-medium text-[var(--text-primary)] transition-colors ${currentPage === 'cv' ? activeClasses : inactiveClasses}">CV</a>
                        <button id="theme-toggle" type="button" class="p-2 rounded-lg text-[var(--text-primary)] hover:bg-[var(--border-primary)]/30 focus:outline-none focus:ring-2 focus:ring-[var(--accent-primary)] transition-colors">
                            <svg id="theme-toggle-dark-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 hidden"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21c3.978 0 7.44-2.03 9.002-5.002Z" /></svg>
                            <svg id="theme-toggle-light-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 hidden"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-6.364-.386 1.591-1.591M3 12h2.25m.386-6.364 1.591 1.591" /></svg>
                            <span class="sr-only">Toggle theme</span>
                        </button>
                    </div>
                </div>
            `;
            navContainer.innerHTML = navHTML;
            const themeToggleBtn = document.getElementById('theme-toggle');
            if (themeToggleBtn) {
                 themeToggleBtn.addEventListener('click', () => {
                    const isCurrentlyDark = document.documentElement.classList.contains('dark');
                    applyTheme(!isCurrentlyDark);
                });
            }
        }

        function applyTheme(isDark) {
            const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
            const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
            if (isDark) {
                document.documentElement.classList.add('dark');
                if (themeToggleDarkIcon) themeToggleDarkIcon.classList.remove('hidden');
                if (themeToggleLightIcon) themeToggleLightIcon.classList.add('hidden');
                localStorage.setItem('color-theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                if (themeToggleDarkIcon) themeToggleDarkIcon.classList.add('hidden');
                if (themeToggleLightIcon) themeToggleLightIcon.classList.remove('hidden');
                localStorage.setItem('color-theme', 'light');
            }
        }

        function renderMarkdownAndMathJax(mdContent) {
            const postContainerElement = document.getElementById('post-container');
            
            // Protect math blocks from Marked.js
            const mathBlocks = [];
            let processedMD = mdContent.replace(/\$\$([\s\S]*?)\$\$/g, (match) => {
                mathBlocks.push(match);
                return `%%MATH_${mathBlocks.length - 1}%%`;
            });
            // Compatible MathJax regex that captures prefix to avoid lookbehinds
            processedMD = processedMD.replace(/(^|[^\\])\$((?:\\\$|[^$])+?)\$/g, (match, prefix, mathContent) => {
                const fullMatch = `$${mathContent}$`;
                mathBlocks.push(fullMatch);
                return `${prefix}%%MATH_${mathBlocks.length - 1}%%`;
            });

            if (typeof marked !== 'undefined') {
                const renderer = new marked.Renderer();
                
                // Custom Image Renderer for wrapping and captions
                // Example Markdown: ![alt text | caption text #align-left #w-50%](url)
                renderer.image = function(href, title, text) {
                    let alignMatch = text.match(/#align-(left|right|center)/);
                    let alignClass = "";
                    let inlineStyle = "";
                    let imgText = text;

                    if (alignMatch) {
                        if (alignMatch[1] === 'left') {
                            alignClass = "float-left mr-6 mb-4";
                        } else if (alignMatch[1] === 'right') {
                            alignClass = "float-right ml-6 mb-4";
                        } else {
                            alignClass = "mx-auto block";
                        }
                        imgText = imgText.replace(alignMatch[0], '').trim();
                    } else {
                        alignClass = "mx-auto block"; // default center
                    }

                    let wMatch = imgText.match(/#w-([0-9]+%|[0-9]+px|[0-9]+)/);
                    if (wMatch) {
                        let w = wMatch[1];
                        if (!w.endsWith('%') && !w.endsWith('px')) w += 'px';
                        inlineStyle += `width: ${w};`;
                        imgText = imgText.replace(wMatch[0], '').trim();
                    }

                    // Treat caption separately if separated by |
                    let parts = imgText.split('|');
                    let altText = parts[0].trim();
                    let caption = parts.length > 1 ? parts[1].trim() : title || altText;
                    
                    let captionHtml = "";
                    if (caption) {
                        captionHtml = `<figcaption>${caption}</figcaption>`;
                    }
                    
                    return `
                    <figure class="my-6 ${alignClass}" style="${inlineStyle}">
                        <img src="${href}" alt="${altText}" title="${title || ''}" class="rounded-lg shadow-sm w-full h-auto">
                        ${captionHtml}
                    </figure>`;
                };
                
                // Allow HTML inside Markdown (like wrapped videos)
                let markedOptions = { renderer: renderer, breaks: true, async: false };
                let htmlContent = marked.parse(processedMD, markedOptions);
                
                // Restore math blocks
                htmlContent = htmlContent.replace(/%%MATH_(\d+)%%/g, (match, index) => {
                    return mathBlocks[index];
                });
                
                postContainerElement.innerHTML = htmlContent;
            } else {
                postContainerElement.innerHTML = "<p>Error: Could not load Markdown parser.</p>";
                return;
            }
            
            if (typeof window.MathJax !== 'undefined' && window.MathJax.startup && window.MathJax.startup.promise) {
                window.MathJax.startup.promise.then(() => {
                    if (typeof window.MathJax.typesetPromise === 'function') {
                        window.MathJax.typesetPromise([postContainerElement])
                            .catch((err) => console.error('MathJax typesetPromise error:', err));
                    }
                });
            } else {
                setTimeout(() => {
                    if (typeof window.MathJax !== 'undefined' && typeof window.MathJax.typesetPromise === 'function') {
                        window.MathJax.typesetPromise([postContainerElement]);
                    }
                }, 500);
            }
        }

        async function fetchAndRenderPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');
            if (!postId) {
                document.getElementById('loading').innerText = "Error: Invalid post ID";
                return;
            }

            try {
                const response = await fetch('/api/posts/' + postId);
                if (!response.ok) {
                    document.getElementById('loading').innerText = "Post not found";
                    return;
                }
                const post = await response.json();

                let contentStr = post.content || '';
                let metadata = { authors: 'Mohammad Al Baqer Alghezi' };
                
                // Parse optional Frontmatter at the beginning of the Markdown
                if (contentStr.startsWith('---')) {
                    const endIdx = contentStr.indexOf('---', 3);
                    if (endIdx > -1) {
                        const fm = contentStr.substring(3, endIdx).trim();
                        contentStr = contentStr.substring(endIdx + 3).trim();
                        fm.split('\n').forEach(line => {
                            const colonIdx = line.indexOf(':');
                            if (colonIdx > -1) {
                                const key = line.substring(0, colonIdx).trim().toLowerCase();
                                const val = line.substring(colonIdx + 1).trim();
                                metadata[key] = val;
                            }
                        });
                    }
                }

                const cleanTitle = post.title.replace(/^\[(?:Project|Publication)\]\s*/i, '');
                document.getElementById('post-title').innerText = cleanTitle;
                document.title = cleanTitle + " | Mohammad Al Baqer Alghezi";
                
                const rawDate = new Date(post.date + 'T00:00:00');
                const formattedDate = isNaN(rawDate) ? post.date : rawDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                
                const isCustomAuthor = metadata.authors !== 'Mohammad Al Baqer Alghezi';
                let affiliationsHtml = metadata.affiliations ? `<p class="text-[var(--text-secondary)] text-sm md:text-base mt-1">${metadata.affiliations}</p>` : '';
                let venueHtml = metadata.venue ? `<p class="text-[var(--text-secondary)] text-base md:text-lg mt-2 font-medium">${metadata.venue}${metadata.year ? ', ' + metadata.year : ''}</p>` : '';
                
                let defaultAuthorHtml = `
                    <div class="flex flex-wrap items-center justify-center gap-4 text-sm md:text-base text-[var(--text-secondary)]">
                        <div class="flex items-center">
                            <img src="photos/personal_photo.png" alt="Author" class="w-10 h-10 rounded-full border-2 border-[var(--accent-primary)] mr-3 object-cover shadow-sm" onerror="this.onerror=null; this.src='https://placehold.co/112x112/A08C7D/4A3B31?text=M';">
                            <span class="font-semibold text-[var(--text-primary)] tracking-wide">Mohammad Al Baqer Alghezi</span>
                        </div>
                        <span class="hidden md:inline text-[var(--border-primary)]">|</span>
                        <time class="font-medium tracking-wide">${formattedDate}</time> 
                    </div>
                `;

                let publicationAuthorHtml = `
                    <div class="space-y-1 mt-4">
                        <p class="text-[#3b82f6] dark:text-[#60a5fa] text-lg md:text-xl font-medium tracking-wide">${metadata.authors}</p>
                        ${affiliationsHtml}
                        ${venueHtml}
                        ${!metadata.hide_date ? `<time class="block mt-2 text-[var(--text-secondary)] text-sm">${formattedDate}</time>` : ''}
                    </div>
                `;

                // Render dynamic tag buttons (Paper, Code, Data, etc.)
                const buttonKeys = ['paper', 'arxiv', 'code', 'data', 'supplementary', 'website'];
                let buttonsHtml = '';
                buttonKeys.forEach(k => {
                    if (metadata[k]) {
                        let icon = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>';
                        if (k === 'code') icon = '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.026 2.747-1.026.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"></path></svg>';
                        if (k === 'paper' || k === 'arxiv') icon = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>';
                        
                        let text = k.charAt(0).toUpperCase() + k.slice(1);
                        if (k === 'arxiv') text = 'arXiv';
                        if (k === 'supplementary') text = 'Supplementary';

                        buttonsHtml += `
                            <a href="${metadata[k]}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center space-x-2 bg-gray-800 hover:bg-gray-700 text-white dark:bg-gray-200 dark:hover:bg-white dark:text-gray-900 px-5 py-2.5 rounded-full text-sm font-bold transition-all shadow-sm transform hover:-translate-y-0.5">
                                ${icon}
                                <span>${text}</span>
                            </a>
                        `;
                    }
                });

                if (buttonsHtml) {
                    buttonsHtml = `<div class="flex flex-wrap items-center justify-center gap-3 mt-8">${buttonsHtml}</div>`;
                }

                document.getElementById('post-metadata-container').innerHTML = 
                    (isCustomAuthor ? publicationAuthorHtml : defaultAuthorHtml) + buttonsHtml;

                // Toggle "Abstract" heading logic
                if (metadata.abstract === 'true' || post.title.startsWith('[Publication]')) {
                    document.getElementById('abstract-heading').classList.remove('hidden');
                }
                renderMarkdownAndMathJax(contentStr);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('post-content-wrapper').classList.remove('hidden');
            } catch(e) {
                document.getElementById('loading').innerText = "Error loading post";
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderNavigation('blog'); 
            const preferredTheme = localStorage.getItem('color-theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (preferredTheme === 'dark' || (!preferredTheme && systemPrefersDark)) {
                applyTheme(true);
            } else {
                applyTheme(false);
            }
            
            fetchAndRenderPost(); 
        });
    </script>
</body>
</html>
